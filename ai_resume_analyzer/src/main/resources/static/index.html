<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-xl p-8 w-[650px]">

    <h1 class="text-2xl font-bold text-center mb-6">
        🚀 AI Resume Analyzer
    </h1>

    <div class="space-y-4">

        <input type="file" id="resume"
               class="border p-2 w-full rounded"/>

        <textarea id="jobDescription"
                  placeholder="Paste Job Description"
                  class="border p-2 w-full rounded h-32"></textarea>

        <input id="userId"
               placeholder="User ID"
               class="border p-2 w-full rounded"/>

        <button onclick="analyzeResume()"
                class="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700">
            Analyze Resume </button>

    </div>

    <div id="loading"
         class="text-center mt-4 hidden">

        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>

        <p class="text-gray-600 mt-2">Analyzing Resume...</p>

    </div>

    <div id="result"
         class="mt-6 hidden">

        <h2 class="font-bold text-lg mb-2">Analysis Result</h2>

        <p><b>Match Score:</b> <span id="score"></span>%</p>

        <p class="mt-2"><b>Missing Skills:</b></p>

        <ul id="skills"
            class="list-disc ml-6 text-gray-700"></ul>

    </div>

    <div class="mt-6">

        <button onclick="loadHistory()"
                class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
            View Resume History </button>

    </div>

    <div id="history"
         class="mt-4 space-y-2"></div>

</div>

<script>

    async function analyzeResume(){

        const file = document.getElementById("resume").files[0];
        const jobDescription = document.getElementById("jobDescription").value;
        const userId = document.getElementById("userId").value;

        const formData = new FormData();

        formData.append("resume",file);
        formData.append("jobDescription",jobDescription);
        formData.append("userId",userId);

        document.getElementById("loading").classList.remove("hidden");

        await fetch("/api/resume/analyze",{
            method:"POST",
            body:formData
        });

        setTimeout(loadHistory,3000);

    }

    async function loadHistory(){

        const userId = document.getElementById("userId").value;

        const res = await fetch(`/api/resume/history/${userId}`);

        const data = await res.json();

        document.getElementById("loading").classList.add("hidden");

        const historyDiv = document.getElementById("history");

        historyDiv.innerHTML="";

        data.forEach(item=>{

            const div = document.createElement("div");

            div.className="border p-3 rounded bg-gray-50";

            div.innerHTML=`
                <p><b>ID:</b> ${item.id}</p>
                <p><b>Score:</b> ${item.matchScore}%</p>
                <p><b>Missing Skills:</b> ${item.missingSkills}</p>
`;

            historyDiv.appendChild(div);

        });

    }

</script>

</body>
</html>
