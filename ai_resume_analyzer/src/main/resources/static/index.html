<!DOCTYPE html>

<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-xl p-8 w-[750px]">

    <h1 class="text-3xl font-bold text-center mb-6">
        🚀 AI Resume Analyzer
    </h1>

    <div class="space-y-4">

        <input type="file" id="resume"
               class="border p-2 w-full rounded"/>

        <textarea id="jobDescription"
                  placeholder="Paste Job Description"
                  class="border p-2 w-full rounded h-32"></textarea>

        <button onclick="analyzeResume()"
                class="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700">
            Analyze Resume </button>

    </div>

    <div id="loading"
         class="text-center mt-6 hidden">

        <div class="animate-spin rounded-full h-10 w-10 border-b-4 border-blue-600 mx-auto"></div>

        <p class="text-gray-600 mt-2">Analyzing Resume...</p>

    </div>

    <div id="result"
         class="mt-6 hidden">

        <h2 class="font-bold text-lg mb-3">Latest Analysis</h2>

        <p class="mb-2 font-semibold">Match Score</p>

        <div class="w-full bg-gray-200 rounded-full h-4 mb-2">

            <div id="scoreBar"
                 class="bg-green-500 h-4 rounded-full"
                 style="width:0%"></div>

        </div>

        <p class="mb-4">
            Score: <span id="scoreText">0</span>%
        </p>

        <h3 class="font-semibold mb-2">Missing Skills</h3>

        <ul id="skills"
            class="list-disc ml-6 text-gray-700 mb-4"></ul>

        <h3 class="font-semibold mb-2">Skill Heatmap</h3>

        <div id="heatmap"
             class="flex flex-wrap gap-2 mb-4"></div>

        <h3 class="font-semibold mb-2">Top Recommended Skills</h3>

        <ul id="recommendations"
            class="list-disc ml-6 text-blue-700 mb-4"></ul>

        <h3 class="font-semibold mb-2">Strengths</h3>

        <ul id="strengths"
            class="list-disc ml-6 text-green-700 mb-4"></ul>

        <h3 class="font-semibold mb-2">Improvements</h3>

        <ul id="improvements"
            class="list-disc ml-6 text-red-600"></ul>

    </div>

    <div class="mt-6">

        <button onclick="loadHistory()"
                class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
            View Resume History </button>

    </div>

    <div id="history"
         class="mt-4 space-y-3"></div>

</div>

<script>

    async function analyzeResume(){

        const file = document.getElementById("resume").files[0];
        const jobDescription = document.getElementById("jobDescription").value;

        if(!file){
            alert("Upload resume first");
            return;
        }

        const username = file.name.split(".")[0];

        const formData = new FormData();

        formData.append("resume",file);
        formData.append("jobDescription",jobDescription);
        formData.append("userId",username);

        document.getElementById("loading").classList.remove("hidden");

        await fetch("/api/resume/analyze",{
            method:"POST",
            body:formData
        });

        pollResult(username);

    }

    function pollResult(userId){

        let attempts = 0;

        const interval = setInterval(async ()=>{

            attempts++;

            const res = await fetch(`/api/resume/history/${userId}`);

            const data = await res.json();

            if(data.length > 0){

                clearInterval(interval);

                showLatest(data[data.length-1]);

            }

            if(attempts > 10){

                clearInterval(interval);

                document.getElementById("loading").classList.add("hidden");

                alert("Analysis taking longer than expected");

            }

        },2000);

    }

    function showLatest(result){

        document.getElementById("loading").classList.add("hidden");

        document.getElementById("result").classList.remove("hidden");

        const score = result.matchScore || 0;

        document.getElementById("scoreBar").style.width = score+"%";

        document.getElementById("scoreText").innerText = score;

        renderList("skills", result.missingSkills);

        renderHeatmap(result.missingSkills);

        renderRecommendations(result.missingSkills);

        renderList("strengths", result.strengths);

        renderList("improvements", result.improvements);

    }

    function renderList(elementId,data){

        const list = document.getElementById(elementId);

        list.innerHTML="";

        if(!data) return;

        data.forEach(item=>{

            const li = document.createElement("li");

            li.innerText=item;

            list.appendChild(li);

        });

    }

    function renderHeatmap(skills){

        const heatmap = document.getElementById("heatmap");

        heatmap.innerHTML="";

        if(!skills) return;

        skills.forEach(skill=>{

            const badge = document.createElement("span");

            badge.className="px-3 py-1 rounded text-white text-sm bg-red-500";

            badge.innerText=skill;

            heatmap.appendChild(badge);

        });

    }

    function renderRecommendations(missing){

        const allSkills=[

            "Java",
            "Spring Boot",
            "Docker",
            "Kubernetes",
            "AWS",
            "Kafka",
            "Redis",
            "Microservices",
            "System Design",
            "CI/CD"

        ];

        const list=document.getElementById("recommendations");

        list.innerHTML="";

        const suggested = allSkills.filter(skill => !missing?.includes(skill)).slice(0,5);

        suggested.forEach(skill=>{

            const li=document.createElement("li");

            li.innerText=skill;

            list.appendChild(li);

        });

    }

    async function loadHistory(){

        const file = document.getElementById("resume").files[0];

        if(!file){

            alert("Upload resume first");

            return;

        }

        const userId = file.name.split(".")[0];

        const res = await fetch(`/api/resume/history/${userId}`);

        const data = await res.json();

        const historyDiv = document.getElementById("history");

        historyDiv.innerHTML="";

        data.forEach(item=>{

            const div=document.createElement("div");

            div.className="border p-3 rounded bg-gray-50";

            div.innerHTML=`

<p><b>ID:</b> ${item.id}</p>

<p><b>Score:</b> ${item.matchScore}%</p>

<p><b>Missing Skills:</b> ${item.missingSkills}</p>

`;

            historyDiv.appendChild(div);

        });

    }

</script>

</body>

</html>
